name: "CodeQL Config"

# Paths to exclude from CodeQL analysis
paths-ignore:
  - '**/test/**'
  - '**/tests/**'
  - '**/*test.html'

# NOTE: CodeQL query-filters don't support path-based exclusions
# To suppress false positives, we exclude specific query IDs
#
# js/xss - XSS warnings in chat-ui-common.js are false positives because:
#   - HTML is sanitized by safeSetInnerHTML() which removes scripts and dangerous attributes
#   - URLs are sanitized by sanitizeUrl() using URL constructor validation
#
# py/log-injection - Log injection warnings are false positives because:
#   - All logged values pass through sanitize_log() which escapes control characters
#
query-filters:
  - exclude:
      id: js/xss
  - exclude:
      id: py/log-injection
