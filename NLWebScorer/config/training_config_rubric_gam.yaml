# NLWebScorer: ModernBERT-large (pure text) + Rubric GAM

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  scores_path: "/Users/rvguha/code/satisficer/nlweb_router/data/scores_azure_oai_gpt-4.1.json"
  retrieval_path: "/Users/rvguha/code/satisficer/nlweb_router/data/retrieval_results.json"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  prepared_dir: "./data/prepared_hard"
  max_seq_length: 1024

# ── ModernBERT-large Fine-tuning (pure text mode) ────────────────────────────
modernbert:
  model_name: "answerdotai/ModernBERT-large"
  output_dir: "./checkpoints/modernbert_large_pure"
  pure_text: true                  # No rubric features in regression head
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 5
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8   # effective batch = 32
  fp16: true
  normalize_scores: true
  loss: "mse"
  ranking_alpha: 0.0               # weight for pairwise margin ranking loss
  score_diff_alpha: 1.0            # weight for pairwise score-difference loss
  lambda_alpha: 0.5                # weight for LambdaRank-weighted loss
  mae_lambda: 1.0                  # weight for MAE penalty in model selection

# ── Rubric GAM ───────────────────────────────────────────────────────────────
rubric_gam:
  output_dir: "./checkpoints/rubric_gam"
  mode: "additive"                 # additive | gated | interaction

  # BERT subnet: [CLS] (1024) → proj (64) → MLP → 1
  bert_proj_dim: 64
  bert_hidden: [128, 64, 32]

  # Rubric group subnets: group features → MLP → 1
  rubric_hidden: [64, 32]

  # Interaction mode MLP (on 6 contributions)
  interaction_hidden: [16]

  activation: "relu"
  dropout: 0.1
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  num_epochs: 200
  batch_size: 256
  patience: 30
  lr_scheduler: "cosine"          # cosine annealing
  ranking_alpha: 1.0              # weight for pairwise ranking loss
  score_diff_alpha: 0.0           # weight for pairwise score-difference loss
  lambda_alpha: 0.0               # weight for LambdaRank-weighted loss
  mae_lambda: 1.0                 # weight for MAE penalty in model selection
